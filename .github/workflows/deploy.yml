name: Deploy Stack

on:
  push:
    branches: [main]
  # Disparado pelos repos de serviço quando publicam imagem nova no GHCR
  repository_dispatch:
    types: [deploy]
  # Botão de redeploy manual na aba Actions
  workflow_dispatch:

# Vários repos podem dar merge ao mesmo tempo — serializa os deploys
concurrency:
  group: deploy
  cancel-in-progress: false

permissions:
  contents: read
  packages: write

jobs:
  # O código do simulador mora neste repo, então a imagem é buildada aqui
  build-simulator:
    if: github.event_name != 'repository_dispatch'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - uses: docker/build-push-action@v6
        with:
          context: ./sensor-simulator
          push: true
          tags: |
            ghcr.io/tcc-smartfarm/sensor-simulator:latest
            ghcr.io/tcc-smartfarm/sensor-simulator:${{ github.sha }}

  deploy:
    needs: [build-simulator]
    # Roda mesmo quando build-simulator foi pulado (repository_dispatch)
    if: ${{ !failure() && !cancelled() }}
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Copiar compose e Caddyfile para a VM
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ secrets.VM_HOST }}
          username: ${{ secrets.VM_USER }}
          key: ${{ secrets.VM_SSH_KEY }}
          source: "docker-compose.prod.yml,Caddyfile"
          target: "~/smartfarm"

      - name: Atualizar stack na VM
        uses: appleboy/ssh-action@v1.2.0
        with:
          host: ${{ secrets.VM_HOST }}
          username: ${{ secrets.VM_USER }}
          key: ${{ secrets.VM_SSH_KEY }}
          script: |
            cd ~/smartfarm
            docker compose -f docker-compose.prod.yml pull
            docker compose -f docker-compose.prod.yml up -d --remove-orphans
            docker image prune -f
