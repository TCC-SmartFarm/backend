services:
  # 1. Broker MQTT Customizado (O coração da ingestão LoRa)
  # Desenvolvido em Go para alta performance e baixo consumo
  mqtt-broker:
    build: ./mqtt-broker
    container_name: mqtt-broker
    restart: always
    ports:
      - "1883:1883"      # Porta MQTT padrão
      - "8883:8883"      # Porta para TLS/SSL (Futuro)
    volumes:
      - ./data/broker:/root/data/db # Persistência das Retained Messages
    networks:
      - smartfarm-network

  # 2. RabbitMQ (Barramento de Eventos)
  # Garante que o sistema suporte o ODS 9 com infraestrutura resiliente
  rabbitmq:
    image: rabbitmq:3-management
    container_name: barramento-de-eventos
    restart: always
    ports:
      - "5672:5672"
      - "15672:15672"
    environment:
      - RABBITMQ_DEFAULT_USER=admin
      - RABBITMQ_DEFAULT_PASS=admin
    networks:
      - smartfarm-network
    healthcheck: # Garante que o serviço está REALMENTE pronto
      test: ["CMD", "rabbitmq-diagnostics", "-q", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  config-rabbit:
    build: ./barramento-de-eventos # O Dockerfile que roda o config_rabbit.go
    depends_on:
      rabbitmq:
        condition: service_healthy # Só roda quando o RabbitMQ passar no healthcheck
    networks:
      - smartfarm-network

  mqtt-sub:
    build: ./mqtt-sub
    container_name: mqtt-sub
    restart: always
    depends_on:
      - cache-service
      - mqtt-broker
      - rabbitmq
    networks:
      - smartfarm-network

  influx-connector:
    build: ./influx-connector
    container_name: influx-connector
    restart: always
    env_file:
      - ./influx-connector/.env
    depends_on:
      - rabbitmq
    networks:
      - smartfarm-network


#####
  redis:
    image: redis:7-alpine
    container_name: redis
    command: redis-server --save 60 1 --loglevel warning
    ports:
      - "6379:6379"
    networks:
      - smartfarm-network

  cache-service:
    build: ./cache-service
    container_name: cache-service
    restart: always
    env_file:
      - ./cache-service/.env
    depends_on:
      - redis
      - rabbitmq
    networks:
      - smartfarm-network
#####

  api-service:
    build: ./api-service
    container_name: api-service
    restart: always
    env_file:
      - ./api-service/.env
    ports:
      - "3000:3000"
    networks:
      - smartfarm-network


# Rede isolada para comunicação segura entre os containers
networks:
  smartfarm-network:
    driver: bridge